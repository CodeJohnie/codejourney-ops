apiVersion: apps/v1
kind: Deployment
metadata:
  name: codejourney
  namespace: dev-testing
  labels:
    app: codejourney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codejourney
  template:
    metadata:
      labels:
        app: codejourney
    spec:
      containers:
        - name: codejourney
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: NEXTAUTH_URL
              value: "https://codejourney.tail9d71dd.ts.net"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: codejourney-auth
                  key: AUTH_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: codejourney-auth
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codejourney-auth
                  key: GOOGLE_CLIENT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
