---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: dev-testing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: dev-testing
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: dev-testing
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: dev-testing
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tailscale-proxy
  namespace: dev-testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-proxy
  serviceName: tailscale-proxy
  template:
    metadata:
      labels:
        app: tailscale-proxy
    spec:
      serviceAccountName: tailscale
      initContainers:
        - name: sysctler
          image: busybox
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c", "sysctl -w net.ipv4.ip_forward=1"]
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: codejourney
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "false"
            - name: TS_SERVE_CONFIG
              value: /etc/tailscale/serve.json
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: serve-config
              mountPath: /etc/tailscale
      volumes:
        - name: serve-config
          configMap:
            name: tailscale-serve-config
  volumeClaimTemplates:
    - metadata:
        name: tailscale-state
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 100Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tailscale-serve-config
  namespace: dev-testing
data:
  serve.json: |
    {
      "TCP": {
        "443": {
          "HTTPS": true
        }
      },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": {
            "/": {
              "Proxy": "http://codejourney.dev-testing.svc.cluster.local:80"
            }
          }
        }
      }
    }
