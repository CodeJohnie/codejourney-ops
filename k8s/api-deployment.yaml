---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codejourney-api
  namespace: dev-testing
  labels:
    app: codejourney-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codejourney-api
  template:
    metadata:
      labels:
        app: codejourney-api
    spec:
      containers:
        - name: codejourney-api
          image: API_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: WEB_URL
              value: "https://codejourney.tail9d71dd.ts.net"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codejourney-api
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis.dev-testing.svc.cluster.local:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codejourney-api
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: codejourney-api
  namespace: dev-testing
spec:
  selector:
    app: codejourney-api
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codejourney-api
  namespace: dev-testing
  annotations:
    tailscale.com/funnel: "false"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: codejourney-api
      port:
        number: 4000
  tls:
    - hosts:
        - codejourney-api  # becomes codejourney-api.tail9d71dd.ts.net
