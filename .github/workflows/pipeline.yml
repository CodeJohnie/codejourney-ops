name: Deploy Pipeline

on:
  repository_dispatch:
    types: [deploy]

env:
  # NodePort address — resolvable by kubelet on all nodes, configured as
  # insecure HTTP mirror in /etc/rancher/k3s/registries.yaml on each node
  REGISTRY: 192.168.0.45:30080
  APP: codejourney
  API_APP: codejourney-api

jobs:
  build-and-deploy:
    runs-on: [self-hosted, k3s]

    steps:
      - name: Checkout CodeJourney source
        uses: actions/checkout@v4
        with:
          repository: CodeJohnie/CodeJourney
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Install nerdctl and buildctl
        run: |
          NERDCTL_VERSION=$(curl -s https://api.github.com/repos/containerd/nerdctl/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)
          curl -fsSL "https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/nerdctl-${NERDCTL_VERSION}-linux-arm64.tar.gz" \
            | tar -xz -C /usr/local/bin nerdctl
          BUILDKIT_VERSION=$(curl -s https://api.github.com/repos/moby/buildkit/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)
          curl -fsSL "https://github.com/moby/buildkit/releases/download/v${BUILDKIT_VERSION}/buildkit-v${BUILDKIT_VERSION}.linux-arm64.tar.gz" \
            | tar -xz -C /usr/local bin/buildctl
          buildctl --version

      - name: Wait for buildkitd
        run: |
          echo "Waiting for buildkitd socket..."
          until buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers 2>/dev/null; do sleep 2; done
          echo "buildkitd ready"

      - name: Build and push web image to Zot
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.APP }}:${{ github.event.client_payload.sha }}"
          LATEST="${{ env.REGISTRY }}/${{ env.APP }}:latest"
          nerdctl --insecure-registry build --platform linux/arm64 -t "${IMAGE}" -t "${LATEST}" -f Dockerfile .
          nerdctl --insecure-registry push "${IMAGE}"
          nerdctl --insecure-registry push "${LATEST}"

      - name: Build and push API image to Zot
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.API_APP }}:${{ github.event.client_payload.sha }}"
          LATEST="${{ env.REGISTRY }}/${{ env.API_APP }}:latest"
          nerdctl --insecure-registry build --platform linux/arm64 -t "${IMAGE}" -t "${LATEST}" -f Dockerfile.api .
          nerdctl --insecure-registry push "${IMAGE}"
          nerdctl --insecure-registry push "${LATEST}"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/kubectl

      - name: Checkout ops repo (for k8s manifests)
        uses: actions/checkout@v4
        with:
          repository: CodeJohnie/codejourney-ops
          token: ${{ secrets.GHCR_TOKEN }}
          path: ops

      - name: Apply infrastructure (postgres, redis) — idempotent
        run: |
          kubectl apply -f ops/k8s/postgres.yaml
          kubectl apply -f ops/k8s/redis.yaml

      - name: Deploy web app
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.APP }}:${{ github.event.client_payload.sha }}"
          if kubectl get deployment ${{ env.APP }} -n dev-testing &>/dev/null; then
            kubectl set image deployment/${{ env.APP }} ${{ env.APP }}="${IMAGE}" -n dev-testing
          else
            sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" ops/k8s/deployment.yaml | kubectl apply -f -
          fi
          kubectl rollout status deployment/${{ env.APP }} -n dev-testing --timeout=120s

      - name: Deploy API
        run: |
          API_IMAGE="${{ env.REGISTRY }}/${{ env.API_APP }}:${{ github.event.client_payload.sha }}"
          if kubectl get deployment ${{ env.API_APP }} -n dev-testing &>/dev/null; then
            kubectl set image deployment/${{ env.API_APP }} ${{ env.API_APP }}="${API_IMAGE}" -n dev-testing
          else
            sed "s|API_IMAGE_PLACEHOLDER|${API_IMAGE}|g" ops/k8s/api-deployment.yaml | kubectl apply -f -
          fi
          kubectl rollout status deployment/${{ env.API_APP }} -n dev-testing --timeout=120s
