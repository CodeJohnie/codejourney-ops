apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner
  namespace: ci
---
# Scoped access: runner can only manage resources in dev-testing
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: dev-testing
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "create", "update", "patch", "apply"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "patch", "apply"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "patch", "apply"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "apply"]
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "create", "update", "patch", "apply"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-deployer
  namespace: dev-testing
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: ci
roleRef:
  kind: Role
  name: deployer
  apiGroup: rbac.authorization.k8s.io
